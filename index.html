<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webliko · Project Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7fafc;
      font-family: 'Inter', sans-serif;
      color: #1a2c3e;
      padding: 2rem 1.5rem;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      gap: 1rem;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      background: #0f7b6e;
      width: 44px; height: 44px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
    }
    .logo-text h1 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1c453e, #0f7b6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .logo-text p { font-size: 0.8rem; color: #5b7a8c; }
    .admin-controls {
      display: flex;
      gap: 12px;
      background: white;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid #e0edf2;
    }
    .admin-badge { font-size: 0.8rem; background: #eef6f3; padding: 0.2rem 0.8rem; border-radius: 30px; color: #0f7b6e; }
    .btn-outline-admin { background: transparent; border: none; font-weight: 500; cursor: pointer; padding: 0.4rem 0.9rem; border-radius: 40px; color: #2c5f7a; }
    .btn-login { background: #0f7b6e; color: white; border: none; }
    .toolbar {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1rem;
      margin-bottom: 2rem; background: white; padding: 0.6rem 1.2rem; border-radius: 70px;
      border: 1px solid #e2edf2;
    }
    .search-wrap {
      display: flex; background: #f9fefc; border-radius: 48px; padding: 0.2rem 0.2rem 0.2rem 1rem;
      border: 1px solid #dee9ef; flex: 1; max-width: 340px;
    }
    .search-wrap input { border: none; padding: 0.65rem; width: 100%; background: transparent; outline: none; }
    .clear-search { background: none; border: none; padding: 0 12px; cursor: pointer; color: #8ba5bc; }
    .stats-badge { background: white; padding: 0.3rem 1.2rem; border-radius: 60px; font-size: 0.8rem; }
    .admin-only-card {
      background: white; border-radius: 32px; padding: 1.5rem; margin-bottom: 2.5rem;
      border: 1px solid #e5f0f5;
    }
    .form-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 1rem; color: #1b4d5e; }
    .form-grid { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
    .input-group { flex: 1; min-width: 170px; }
    .input-group label { font-size: 0.7rem; font-weight: 600; color: #5f7f9e; display: block; margin-bottom: 5px; }
    .input-group input, .input-group textarea { width: 100%; padding: 0.7rem 1rem; border-radius: 20px; border: 1.5px solid #e2edf2; font-family: inherit; }
    .btn-primary { background: #0f7b6e; border: none; padding: 0.6rem 1.6rem; border-radius: 40px; color: white; cursor: pointer; }
    .btn-secondary { background: #f0f4f9; border: 1px solid #cde0e8; padding: 0.6rem 1.3rem; border-radius: 40px; cursor: pointer; }
    .websites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.8rem; margin-top: 1rem; }
    .card { background: white; border-radius: 28px; padding: 1.4rem; border: 1px solid #eaf3f0; }
    .card-header { display: flex; justify-content: space-between; }
    .card-title { font-weight: 700; font-size: 1.25rem; color: #1c4e4a; display: flex; gap: 8px; align-items: center; }
    .card-actions button { background: none; border: none; cursor: pointer; color: #99b8ca; font-size: 1rem; margin-left: 8px; }
    .card-description { margin: 1rem 0; color: #2f5e6e; font-size: 0.85rem; }
    .card-link { display: inline-flex; background: #f3faf7; padding: 0.5rem 1rem; border-radius: 34px; text-decoration: none; color: #16685c; font-size: 0.8rem; }
    .empty-state { text-align: center; grid-column: 1/-1; padding: 3rem; color: #7399ae; }
    footer { margin-top: 3rem; text-align: center; font-size: 0.75rem; color: #98b1c2; border-top: 1px solid #e4eff5; padding-top: 1.5rem; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(6px); align-items: center; justify-content: center; z-index: 1000; }
    .modal-card { background: white; max-width: 400px; width: 90%; border-radius: 36px; padding: 2rem; text-align: center; }
    .modal-card input { width: 100%; padding: 0.9rem; margin: 1rem 0; border-radius: 60px; border: 1px solid #cde0e8; }
    .btn-modal { background: #0f7b6e; color: white; border: none; padding: 0.7rem; width: 100%; border-radius: 60px; cursor: pointer; }
    .error-msg { color: #e27c5c; font-size: 0.75rem; }
    .hidden-admin { display: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-globe"></i></div>
      <div class="logo-text"><h1>Webliko</h1><p>your project hub · works offline</p></div>
    </div>
    <div class="admin-controls">
      <span id="adminStatusBadge" class="admin-badge"><i class="fas fa-eye"></i> Viewer</span>
      <button id="adminActionBtn" class="btn-outline-admin"><i class="fas fa-lock"></i> Admin login</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search..."><button class="clear-search" id="clearSearchBtn"><i class="fas fa-times-circle"></i></button></div>
    <div class="stats-badge" id="statsCounter"><i class="fas fa-layer-group"></i> loading...</div>
  </div>

  <div id="adminFormSection" class="admin-only-card hidden-admin">
    <div class="form-title"><i class="fas fa-plus-circle"></i> <span id="formModeText">Add new website</span><span id="editModeBadge" style="font-size:0.7rem; margin-left:10px; display:none;">✎ editing</span></div>
    <div class="form-grid">
      <div class="input-group"><label>Title *</label><input type="text" id="websiteTitle" placeholder="e.g., My Portfolio"></div>
      <div class="input-group"><label>URL *</label><input type="text" id="websiteUrl" placeholder="https://example.com"></div>
      <div class="input-group"><label>Description</label><textarea id="websiteDesc" rows="1" placeholder="Short description"></textarea></div>
    </div>
    <div style="display: flex; gap: 12px;">
      <button id="submitWebsiteBtn" class="btn-primary"><i class="fas fa-save"></i> Save</button>
      <button id="cancelEditBtn" class="btn-secondary" style="display:none;">Cancel</button>
      <button id="resetDefaultBtn" class="btn-secondary">Reset to defaults</button>
    </div>
    <div id="formFeedback" style="font-size:0.7rem; margin-top: 12px; color:#c95a3a;"></div>
  </div>

  <div id="websitesGridContainer" class="websites-grid"></div>
  <footer>✨ Created by Sangamesh Hiremath · webliko hub · data saved locally ✨</footer>
</div>

<div id="adminModal" class="modal">
  <div class="modal-card">
    <i class="fas fa-key" style="font-size:2rem;"></i>
    <h3>Admin access</h3>
    <p style="font-size:0.8rem;">Enter password to manage projects</p>
    <input type="password" id="adminPassword" placeholder="Password">
    <button id="modalLoginBtn" class="btn-modal">Unlock dashboard</button>
    <div id="modalError" class="error-msg"></div>
  </div>
</div>

<script>
  // ========== WEBLIKO - LOCALSTORAGE VERSION (FULLY WORKING) ==========
  const STORAGE_KEY = "webliko_local";
  const ADMIN_PASSWORD = "bonsai2025";
  
  let websites = [];
  let editingId = null;
  let isAdmin = false;
  
  // DOM elements
  const grid = document.getElementById("websitesGridContainer");
  const searchInput = document.getElementById("searchInput");
  const clearSearch = document.getElementById("clearSearchBtn");
  const adminForm = document.getElementById("adminFormSection");
  const adminBadge = document.getElementById("adminStatusBadge");
  const adminBtn = document.getElementById("adminActionBtn");
  const resetBtn = document.getElementById("resetDefaultBtn");
  const submitBtn = document.getElementById("submitWebsiteBtn");
  const cancelEdit = document.getElementById("cancelEditBtn");
  const titleInp = document.getElementById("websiteTitle");
  const urlInp = document.getElementById("websiteUrl");
  const descInp = document.getElementById("websiteDesc");
  const formMode = document.getElementById("formModeText");
  const editBadge = document.getElementById("editModeBadge");
  const formFeedback = document.getElementById("formFeedback");
  const statsSpan = document.getElementById("statsCounter");
  const modal = document.getElementById("adminModal");
  const modalPwd = document.getElementById("adminPassword");
  const modalLogin = document.getElementById("modalLoginBtn");
  const modalError = document.getElementById("modalError");
  
  // Helper functions
  function saveToLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(websites));
  }
  
  function loadFromLocal() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        websites = JSON.parse(stored);
        if (!Array.isArray(websites)) websites = [];
      } catch(e) { websites = []; }
    }
    if (!websites.length) {
      // Default sample projects
      websites = [
        { id: 1001, title: "🌿 Webliko Studio", description: "Immersive brand experience", url: "https://webliko-studio.demo" },
        { id: 1002, title: "📈 Flow Analytics", description: "Real-time dashboard", url: "https://flowanalytics.example" },
        { id: 1003, title: "🧘 Mindful Canvas", description: "Journaling app", url: "https://mindful-canvas.app" }
      ];
      saveToLocal();
    }
  }
  
  function normalizeUrl(u) { let t = u.trim(); if (!t) return ""; if (!/^https?:\/\//i.test(t)) return "https://"+t; return t; }
  function escapeHtml(s) { if (!s) return ""; return s.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function showFeedback(msg, color="#0f7b6e") { formFeedback.innerText = msg; formFeedback.style.color = color; setTimeout(()=>{ if(formFeedback.innerText===msg) formFeedback.innerText=""; }, 2500); }
  
  function cancelEditing() {
    editingId = null;
    titleInp.value = "";
    urlInp.value = "";
    descInp.value = "";
    formMode.innerText = "Add new website";
    cancelEdit.style.display = "none";
    editBadge.style.display = "none";
  }
  
  function renderGrid() {
    const term = searchInput.value.toLowerCase();
    let filtered = websites.filter(w => w.title.toLowerCase().includes(term) || (w.description && w.description.toLowerCase().includes(term)));
    statsSpan.innerHTML = `<i class="fas fa-layer-group"></i> ${filtered.length} / ${websites.length} projects`;
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i><p>No projects found.<br>${isAdmin ? 'Add one using the form above.' : 'Admin login required to add.'}</p></div>`;
      return;
    }
    let sorted = [...filtered].sort((a,b) => b.id - a.id);
    grid.innerHTML = sorted.map(w => `
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-globe"></i> ${escapeHtml(w.title)}</div>
          ${isAdmin ? `<div class="card-actions"><button class="edit-card" data-id="${w.id}"><i class="fas fa-pen"></i></button><button class="delete-card" data-id="${w.id}"><i class="fas fa-trash-alt"></i></button></div>` : ''}
        </div>
        <div class="card-description">${escapeHtml(w.description || "📁 No description")}</div>
        <a href="${escapeHtml(w.url)}" target="_blank" rel="noopener" class="card-link"><i class="fas fa-external-link-alt"></i> visit website</a>
      </div>
    `).join("");
  }
  
  function addOrUpdate() {
    if (!isAdmin) return;
    let title = titleInp.value.trim();
    let rawUrl = urlInp.value.trim();
    let desc = descInp.value.trim();
    if (!title) { showFeedback("❌ Title required", "#c95a3a"); return; }
    if (!rawUrl) { showFeedback("❌ URL required", "#c95a3a"); return; }
    let finalUrl = normalizeUrl(rawUrl);
    try { new URL(finalUrl); } catch(e) { showFeedback("⚠️ Invalid URL", "#c95a3a"); return; }
    
    if (editingId !== null) {
      let index = websites.findIndex(w => w.id === editingId);
      if (index !== -1) {
        websites[index] = { ...websites[index], title, url: finalUrl, description: desc || "✨ No description" };
        saveToLocal();
        cancelEditing();
        renderGrid();
        showFeedback("✅ Updated", "#0f7b6e");
      }
    } else {
      let newId = Date.now();
      websites.push({ id: newId, title, url: finalUrl, description: desc || "🌱 New project" });
      saveToLocal();
      titleInp.value = ""; urlInp.value = ""; descInp.value = "";
      renderGrid();
      showFeedback("✨ Added", "#0f7b6e");
    }
  }
  
  function deleteWebsite(id) {
    if (!isAdmin) return;
    if (confirm("Delete this project?")) {
      websites = websites.filter(w => w.id !== id);
      saveToLocal();
      if (editingId === id) cancelEditing();
      renderGrid();
      showFeedback("🗑️ Removed", "#e27c5c");
    }
  }
  
  function resetToDefault() {
    if (!isAdmin) return;
    if (confirm("Reset all projects to default samples? Your data will be lost.")) {
      websites = [
        { id: 1001, title: "🌿 Webliko Studio", description: "Immersive brand experience", url: "https://webliko-studio.demo" },
        { id: 1002, title: "📈 Flow Analytics", description: "Real-time dashboard", url: "https://flowanalytics.example" },
        { id: 1003, title: "🧘 Mindful Canvas", description: "Journaling app", url: "https://mindful-canvas.app" }
      ];
      saveToLocal();
      cancelEditing();
      renderGrid();
      showFeedback("Reset to defaults", "#0f7b6e");
    }
  }
  
  function editWebsite(website) {
    if (!isAdmin) return;
    editingId = website.id;
    titleInp.value = website.title;
    urlInp.value = website.url;
    descInp.value = website.description || "";
    formMode.innerText = "Edit website";
    cancelEdit.style.display = "inline-flex";
    editBadge.style.display = "inline-block";
    adminForm.scrollIntoView({ behavior: "smooth" });
  }
  
  // Admin session
  function checkAdminSession() {
    isAdmin = sessionStorage.getItem("weblikoAdmin") === "true";
    updateAdminUI();
  }
  function setAdminSession(val) {
    if (val) { sessionStorage.setItem("weblikoAdmin", "true"); isAdmin = true; }
    else { sessionStorage.removeItem("weblikoAdmin"); isAdmin = false; }
    updateAdminUI();
    renderGrid();
  }
  function updateAdminUI() {
    if (isAdmin) {
      adminForm.classList.remove("hidden-admin");
      adminBadge.innerHTML = '<i class="fas fa-crown"></i> Admin mode';
      adminBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
      adminBtn.classList.remove("btn-login");
      resetBtn.style.display = "inline-flex";
    } else {
      adminForm.classList.add("hidden-admin");
      adminBadge.innerHTML = '<i class="fas fa-eye"></i> Viewer';
      adminBtn.innerHTML = '<i class="fas fa-lock"></i> Admin login';
      adminBtn.classList.add("btn-login");
      resetBtn.style.display = "inline-flex";
      cancelEditing();
    }
  }
  
  // Event binding
  function bindEvents() {
    searchInput.addEventListener("input", () => renderGrid());
    clearSearch.addEventListener("click", () => { searchInput.value = ""; renderGrid(); });
    submitBtn.addEventListener("click", (e) => { e.preventDefault(); if (isAdmin) addOrUpdate(); });
    cancelEdit.addEventListener("click", (e) => { e.preventDefault(); cancelEditing(); });
    resetBtn.addEventListener("click", () => { if (isAdmin) resetToDefault(); });
    adminBtn.addEventListener("click", () => {
      if (isAdmin) { setAdminSession(false); renderGrid(); }
      else { modal.style.display = "flex"; modalPwd.value = ""; modalError.innerText = ""; }
    });
    modalLogin.addEventListener("click", () => {
      if (modalPwd.value === ADMIN_PASSWORD) {
        modal.style.display = "none";
        setAdminSession(true);
        renderGrid();
      } else {
        modalError.innerText = "Incorrect password.";
      }
    });
    window.addEventListener("click", (e) => { if (e.target === modal) modal.style.display = "none"; });
    grid.addEventListener("click", (e) => {
      let btn = e.target.closest("button");
      if (!btn || !isAdmin) return;
      let id = parseInt(btn.getAttribute("data-id"));
      if (btn.classList.contains("edit-card")) {
        let found = websites.find(w => w.id === id);
        if (found) editWebsite(found);
      } else if (btn.classList.contains("delete-card")) {
        deleteWebsite(id);
      }
    });
  }
  
  // Initialize
  loadFromLocal();
  checkAdminSession();
  bindEvents();
  renderGrid();
</script>
</body>
</html>
